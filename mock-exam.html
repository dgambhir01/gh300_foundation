<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock Exam — GH-300 Prep</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤖</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="exam-header">
  <div class="container exam-header-inner">
    <a href="index.html" class="site-logo" onclick="return confirmLeave(event)">
      <div class="logo-icon">&#x1F916;</div>
      <span>GH-300 Prep</span>
    </a>
    <span style="font-size:0.875rem;color:var(--text-secondary);font-weight:500">Mock Exam — 100 min</span>
    <div class="exam-timer" id="timer">100:00</div>
  </div>
</header>

<div class="container">
  <div class="exam-layout">

    <!-- Sidebar -->
    <aside class="exam-sidebar">
      <div class="card" style="padding:1rem">
        <div style="font-size:0.8125rem;font-weight:600;color:var(--text-secondary)">Question Navigator</div>
        <div class="navigator-grid" id="nav-grid"></div>
        <div class="nav-legend">
          <div class="legend-item">
            <div class="legend-dot" style="background:rgba(31,111,235,0.2);border-color:var(--blue)"></div>Current
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:rgba(35,134,54,0.2);border-color:rgba(35,134,54,0.5)"></div>Answered
          </div>
          <div class="legend-item">
            <div class="legend-dot" style="background:rgba(210,153,34,0.2);border-color:#d29922"></div>Flagged
          </div>
        </div>
      </div>
      <button class="btn btn-danger w-full" id="submit-btn" onclick="confirmSubmit()">Submit Exam</button>
      <div id="sidebar-progress" style="font-size:0.8125rem;color:var(--text-muted);text-align:center"></div>
    </aside>

    <!-- Question -->
    <main>
      <div id="question-container" class="question-area"></div>
    </main>

  </div>
</div>

<!-- Results Modal -->
<div class="modal-overlay hidden" id="results-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Exam Results</span>
      <div style="display:flex;gap:0.75rem">
        <a href="index.html" class="btn btn-outline btn-sm">Home</a>
        <a href="mock-exam.html" class="btn btn-primary btn-sm">Retake</a>
      </div>
    </div>
    <div class="modal-body" id="results-body"></div>
  </div>
</div>

<script src="questions.js"></script>
<script>
// ── State ──────────────────────────────────────────────────
let examQuestions = [];
let userAnswers   = {};   // { index: number | number[] }
let flagged       = new Set();
let currentIndex  = 0;
let timeRemaining = 100 * 60;
let timerInterval = null;
let examFinished  = false;

// ── Init ───────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const qs = window.QUESTIONS || [];
  if (qs.length === 0) {
    document.getElementById('question-container').innerHTML =
      '<div class="empty-state"><div class="empty-state-icon">⚠️</div><p>No questions found. Make sure questions.js is present.</p></div>';
    return;
  }
  const shuffled = [...qs].sort(() => Math.random() - 0.5);
  examQuestions = shuffled.slice(0, Math.min(60, shuffled.length));
  buildNavigator();
  renderQuestion(0);
  startTimer();
});

// ── Timer ──────────────────────────────────────────────────
function startTimer() {
  updateTimerDisplay();
  timerInterval = setInterval(() => {
    timeRemaining--;
    updateTimerDisplay();
    if (timeRemaining <= 0) { clearInterval(timerInterval); submitExam(true); }
  }, 1000);
}

function updateTimerDisplay() {
  const m = Math.floor(timeRemaining / 60);
  const s = timeRemaining % 60;
  const el = document.getElementById('timer');
  el.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  el.classList.toggle('warning', timeRemaining <= 600);
}

// ── Navigator ──────────────────────────────────────────────
function buildNavigator() {
  const grid = document.getElementById('nav-grid');
  grid.innerHTML = examQuestions.map((_, i) =>
    `<button class="nav-box" id="nav-${i}" onclick="navigateTo(${i})">${i + 1}</button>`
  ).join('');
  updateNavigator();
}

function updateNavigator() {
  examQuestions.forEach((_, i) => {
    const box = document.getElementById(`nav-${i}`);
    if (!box) return;
    box.className = 'nav-box';
    const ans = userAnswers[i];
    const answered = ans !== undefined && ans !== null &&
      (typeof ans === 'number' || (Array.isArray(ans) && ans.length > 0));
    if (i === currentIndex) box.classList.add('current');
    if (answered)           box.classList.add('answered');
    if (flagged.has(i))     box.classList.add('flagged');
  });

  const answered = Object.values(userAnswers).filter(a =>
    a !== undefined && a !== null && (!Array.isArray(a) || a.length > 0)
  ).length;
  document.getElementById('sidebar-progress').textContent =
    `${answered} of ${examQuestions.length} answered`;
}

// ── Render Question ────────────────────────────────────────
function renderQuestion(index) {
  currentIndex = index;
  const q      = examQuestions[index];
  const isSingle = q.type === 'single';
  const answer   = userAnswers[index];

  const optionsHtml = q.options.map((opt, i) => {
    const letter = String.fromCharCode(65 + i);
    const selected = isSingle ? answer === i : (Array.isArray(answer) && answer.includes(i));
    return `<div class="option${selected ? ' selected' : ''}" onclick="selectAnswer(${index},${i})">
      <span class="option-marker">${isSingle ? (selected ? '●' : '○') : (selected ? '☑' : '☐')}</span>
      <span class="option-letter">${letter}.</span>
      <span class="option-text">${escHtml(opt)}</span>
    </div>`;
  }).join('');

  const isFlagged = flagged.has(index);
  const required     = isSingle ? 1 : q.correct.length;
  const selectedCount = Array.isArray(answer) ? answer.length : (typeof answer === 'number' ? 1 : 0);
  const counterHtml  = isSingle ? '' : (() => {
    const done = selectedCount >= required;
    const col  = done ? 'var(--green-light)' : selectedCount > 0 ? '#e3b341' : 'var(--text-muted)';
    return `<p style="font-size:0.8125rem;margin-top:0.5rem;color:${col}">${selectedCount} of ${required} selected${done ? ' ✓' : ''}</p>`;
  })();
  document.getElementById('question-container').innerHTML = `
    <div class="question-meta">
      <span class="question-counter">Question ${index + 1} of ${examQuestions.length}</span>
      <span class="badge badge-muted">${escHtml(q.domain)}</span>
      ${isFlagged ? '<span class="badge badge-orange">⚑ Flagged</span>' : ''}
    </div>
    <p class="question-instruction">${isSingle ? 'Select one answer.' : `Select ${required} answer${required > 1 ? 's' : ''}.`}</p>
    <p class="question-text">${escHtml(q.question)}</p>
    <div class="options-list">${optionsHtml}</div>
    ${counterHtml}
    <div class="question-controls">
      <button class="btn btn-outline flag-btn${isFlagged ? ' flagged' : ''}" onclick="toggleFlag(${index})">
        ${isFlagged ? '⚑ Unflag' : '⚐ Flag for Review'}
      </button>
      <div style="display:flex;gap:0.5rem">
        <button class="btn btn-secondary" onclick="navigateTo(${index - 1})"${index === 0 ? ' disabled' : ''}>← Prev</button>
        ${index < examQuestions.length - 1
          ? `<button class="btn btn-primary" onclick="navigateTo(${index + 1})">Next →</button>`
          : `<button class="btn btn-primary" onclick="confirmSubmit()">Review &amp; Submit</button>`}
      </div>
    </div>`;

  updateNavigator();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Answer Selection ───────────────────────────────────────
function selectAnswer(qIndex, optIndex) {
  const q = examQuestions[qIndex];
  if (q.type === 'single') {
    userAnswers[qIndex] = optIndex;
  } else {
    if (!Array.isArray(userAnswers[qIndex])) userAnswers[qIndex] = [];
    const arr = userAnswers[qIndex];
    const pos = arr.indexOf(optIndex);
    if (pos === -1) arr.push(optIndex); else arr.splice(pos, 1);
  }
  renderQuestion(qIndex);
}

function toggleFlag(index) {
  flagged.has(index) ? flagged.delete(index) : flagged.add(index);
  renderQuestion(index);
}

function navigateTo(index) {
  if (index < 0 || index >= examQuestions.length) return;
  renderQuestion(index);
}

// ── Submit ─────────────────────────────────────────────────
function confirmSubmit() {
  const answered = Object.values(userAnswers).filter(a =>
    a !== undefined && a !== null && (!Array.isArray(a) || a.length > 0)
  ).length;
  const unanswered = examQuestions.length - answered;
  let msg = `Submit your exam?\n\nAnswered: ${answered}/${examQuestions.length}`;
  if (unanswered > 0) msg += `\nUnanswered: ${unanswered}`;
  if (flagged.size  > 0) msg += `\nFlagged for review: ${flagged.size}`;
  msg += '\n\nThis action cannot be undone.';
  if (confirm(msg)) submitExam(false);
}

function submitExam(auto) {
  if (examFinished) return;
  examFinished = true;
  clearInterval(timerInterval);
  document.getElementById('submit-btn').disabled = true;
  const results = calculateResults();
  saveToHistory(results);
  showResults(results);
}

// ── Scoring ────────────────────────────────────────────────
function calculateResults() {
  let totalCorrect = 0;
  const domainScores  = {};
  const questionResults = [];

  examQuestions.forEach((q, i) => {
    const answer = userAnswers[i];
    let isCorrect = false;

    if (q.type === 'single') {
      isCorrect = answer === q.correct;
    } else {
      const us = Array.isArray(answer) ? [...answer].sort().join(',') : '';
      const cs = [...q.correct].sort().join(',');
      isCorrect = us === cs;
    }

    if (isCorrect) totalCorrect++;
    if (!domainScores[q.domain]) domainScores[q.domain] = { correct: 0, total: 0 };
    domainScores[q.domain].total++;
    if (isCorrect) domainScores[q.domain].correct++;
    questionResults.push({ q, i, answer, isCorrect });
  });

  const score = Math.round((totalCorrect / examQuestions.length) * 1000);
  return {
    score, passed: score >= 700,
    totalCorrect, total: examQuestions.length,
    domainScores, questionResults,
    timeTaken: 6000 - timeRemaining,
    date: new Date().toISOString()
  };
}

function saveToHistory(r) {
  const history = JSON.parse(localStorage.getItem('gh300_mock_history') || '[]');
  history.push({
    date: r.date, score: r.score, passed: r.passed,
    correct: r.totalCorrect, total: r.total,
    domainScores: r.domainScores
  });
  localStorage.setItem('gh300_mock_history', JSON.stringify(history));
}

// ── Results Modal ──────────────────────────────────────────
function showResults(r) {
  const tm = Math.floor(r.timeTaken / 60);
  const ts = r.timeTaken % 60;

  const domainHtml = Object.entries(r.domainScores).map(([d, data]) => {
    const pct = Math.round((data.correct / data.total) * 100);
    const col = pct >= 70 ? 'var(--green)' : '#f85149';
    return `<div class="domain-row">
      <div class="domain-row-header">
        <span class="domain-name">${escHtml(d)}</span>
        <span class="domain-pct">${data.correct}/${data.total} (${pct}%)</span>
      </div>
      <div class="progress-bar">
        <div class="progress-bar-fill" style="width:${pct}%;background:${col}"></div>
      </div>
    </div>`;
  }).join('');

  const reviewHtml = r.questionResults.map(({ q, i, answer, isCorrect }) => {
    const userText    = fmtAnswer(q, answer);
    const correctText = fmtCorrect(q);
    return `<div class="review-item ${isCorrect ? 'review-correct' : 'review-incorrect'}">
      <div class="review-meta">
        <span class="badge ${isCorrect ? 'badge-green' : 'badge-red'}">${isCorrect ? '✓ Correct' : '✗ Incorrect'}</span>
        <span class="badge badge-muted">${escHtml(q.domain)}</span>
        <span class="text-muted" style="font-size:0.78rem">Q${i + 1}</span>
      </div>
      <p class="review-question-text">${escHtml(q.question)}</p>
      ${!isCorrect ? `<p class="review-answer-label">Your answer: <span style="color:#ff7b72">${escHtml(userText || '(not answered)')}</span></p>` : ''}
      <p class="review-answer-label">Correct: <span style="color:var(--green-light)">${escHtml(correctText)}</span></p>
      <p class="review-explanation">${escHtml(q.explanation)}</p>
    </div>`;
  }).join('');

  document.getElementById('results-body').innerHTML = `
    <div class="score-display fade-in">
      <div class="score-number ${r.passed ? 'pass' : 'fail'}">${r.score}</div>
      <div class="score-verdict" style="color:${r.passed ? 'var(--green-light)' : '#ff7b72'}">${r.passed ? '✓ PASS' : '✗ FAIL'}</div>
      <div class="score-details">${r.totalCorrect} of ${r.total} correct &nbsp;·&nbsp; Time: ${tm}m ${ts}s &nbsp;·&nbsp; Pass mark: 700/1000</div>
    </div>
    <div>
      <h3 class="section-title mb-2">Domain Breakdown</h3>
      <div class="domain-breakdown">${domainHtml}</div>
    </div>
    <div>
      <h3 class="section-title mb-2">Answer Review</h3>
      <div class="review-list">${reviewHtml}</div>
    </div>
    <div style="display:flex;gap:0.75rem;justify-content:center;padding:1rem 0 0.5rem">
      <a href="index.html" class="btn btn-secondary">Back to Home</a>
      <a href="mock-exam.html" class="btn btn-primary">Take Another Exam</a>
    </div>`;

  document.getElementById('results-modal').classList.remove('hidden');
}

// ── Helpers ────────────────────────────────────────────────
function fmtAnswer(q, answer) {
  if (answer === undefined || answer === null) return null;
  if (q.type === 'single') {
    if (typeof answer !== 'number') return null;
    return `${String.fromCharCode(65 + answer)}. ${q.options[answer]}`;
  }
  if (!Array.isArray(answer) || answer.length === 0) return null;
  return [...answer].sort().map(i => `${String.fromCharCode(65 + i)}. ${q.options[i]}`).join('; ');
}

function fmtCorrect(q) {
  if (q.type === 'single') return `${String.fromCharCode(65 + q.correct)}. ${q.options[q.correct]}`;
  return [...q.correct].sort().map(i => `${String.fromCharCode(65 + i)}. ${q.options[i]}`).join('; ');
}

function escHtml(str) {
  if (!str && str !== 0) return '';
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function confirmLeave(e) {
  if (!examFinished && examQuestions.length > 0) {
    if (!confirm('Leave the exam? Your progress and timer will be lost.')) {
      e.preventDefault(); return false;
    }
  }
  return true;
}
</script>
</body>
</html>
